name: Sync Feishu Data

on:
  # 支持手动触发
  workflow_dispatch:

  # 定时任务：每天上午9点和下午5点自动检查
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 17 * * *'

  # 支持通过repository_dispatch事件触发（看板页面按钮调用）
  repository_dispatch:
    types: [feishu-update]

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm init -y && npm install axios

      - name: Fetch data from Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          SPREADSHEET_TOKEN: BIMhszZpohx6JItqyLYcx2VjnDf
        run: |
          cat > fetch-data.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');

          async function getTenantAccessToken() {
            const response = await axios.post('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
              app_id: process.env.FEISHU_APP_ID,
              app_secret: process.env.FEISHU_APP_SECRET
            });
            return response.data.tenant_access_token;
          }

          async function fetchSheetData(token, sheetId) {
            const accessToken = await getTenantAccessToken();
            const response = await axios.get(
              `https://open.feishu.cn/open-apis/sheets/v2/spreadsheets/${process.env.SPREADSHEET_TOKEN}/values/${sheetId}!A1:V30`,
              {
                headers: {
                  'Authorization': `Bearer ${accessToken}`
                },
                params: {
                  valueRenderOption: 'FormattedValue'
                }
              }
            );
            return response.data.data.valueRange.values;
          }

          function parseData(values) {
            const data = [];
            const suppliers = ['AAC', '立讯', '睿翔'];
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

            let currentSupplier = null;
            let currentData = {};

            for (let i = 0; i < values.length; i++) {
              const row = values[i];
              if (!row || !row[0]) continue;

              // 检测供应商名称
              if (suppliers.includes(row[0])) {
                if (currentSupplier && Object.keys(currentData).length > 0) {
                  // 保存上一个供应商的数据
                  for (const month of months) {
                    if (currentData[month]) {
                      data.push({
                        supplier: currentSupplier,
                        month: month,
                        ...currentData[month]
                      });
                    }
                  }
                }
                currentSupplier = row[0];
                currentData = {};
              }

              // 解析数据行
              if (currentSupplier && row[1]) {
                const category = row[1].trim();
                for (let j = 2; j < 14; j++) {
                  const monthIndex = j - 2;
                  const month = months[monthIndex];
                  if (!currentData[month]) {
                    currentData[month] = {};
                  }

                  const value = row[j] ? row[j].toString().trim() : '';

                  switch (category) {
                    case '退料数量':
                      currentData[month].returnQty = parseInt(value) || 0;
                      break;
                    case '投入数':
                      currentData[month].inputQty = parseInt(value) || 0;
                      break;
                    case 'DPPM':
                      currentData[month].dppm = parseFloat(value) || 0;
                      break;
                    case '接收批数':
                      currentData[month].receiveBatch = parseInt(value) || 0;
                      break;
                    case '来料总批数':
                      currentData[month].totalBatch = parseInt(value) || 0;
                      break;
                    case 'IQC LAR':
                      currentData[month].lar = value || '0%';
                      break;
                  }
                }
              }
            }

            // 保存最后一个供应商的数据
            if (currentSupplier && Object.keys(currentData).length > 0) {
              for (const month of months) {
                if (currentData[month] && currentData[month].returnQty !== undefined) {
                  data.push({
                    supplier: currentSupplier,
                    month: month,
                    ...currentData[month]
                  });
                }
              }
            }

            return data;
          }

          async function main() {
            try {
              console.log('Fetching data from Feishu...');
              const values = await fetchSheetData(process.env.SPREADSHEET_TOKEN, 'QkhGvp');

              console.log('Parsing data...');
              const data = parseData(values);

              const result = {
                metadata: {
                  title: '天线支架硬性指标数据',
                  source: '飞书多维表格 - 2026年天线支架IQC数据',
                  lastUpdated: new Date().toISOString().split('T')[0],
                  dppmTarget: 45.9,
                  larTarget: '99.13%'
                },
                data: data.map(item => ({
                  ...item,
                  dppmTarget: 45.9,
                  larTarget: '99.13%'
                }))
              };

              fs.writeFileSync('data.json', JSON.stringify(result, null, 2));
              console.log(`Data synced successfully! ${data.length} records.`);
            } catch (error) {
              console.error('Error syncing data:', error.message);
              process.exit(1);
            }
          }

          main();
          EOF

      - name: Run sync script
        run: node fetch-data.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: auto-sync data from Feishu [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
